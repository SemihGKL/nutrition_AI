# Profil des tests d'intégration (Testcontainers). La datasource est fournie par
# @ServiceConnection (conteneur Postgres) ; on ne charge PAS le seed (db/seed),
# et le profil "dev" (DataInitializer, FlywayDevConfig) n'est pas actif.
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=test-secret-key-that-is-at-least-32-characters-long
jwt.expiration=900000
app.cookie.secure=false
allowed.origins=http://localhost:5173

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.base-url=http://localhost:5173

logging.level.root=WARN
