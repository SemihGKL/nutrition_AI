# Active par défaut en développement local.
# En production, surcharger via variable d'environnement : SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Actuator — on n'expose QUE le health check, utilisé par la sonde de readiness
# du déploiement (curl direct sur 127.0.0.1:8080). Comme nginx ne proxifie que
# /api, /actuator n'est pas joignable depuis Internet. La santé inclut la DB :
# le health passe à 200 seulement quand Postgres est joignable.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Anti-spam / anti-brute-force — limitation de débit en mémoire (par IP pour
# /api/auth/*, par utilisateur authentifié pour /api/support). Valeurs =
# nombre de requêtes autorisées par fenêtre de rechargement (en secondes).
app.rate-limit.auth.capacity=10
app.rate-limit.auth.refill-seconds=60
app.rate-limit.support.capacity=5
app.rate-limit.support.refill-seconds=60

