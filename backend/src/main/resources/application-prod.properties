spring.application.name=backend

# Datasource — Railway : définir DATABASE_URL au format jdbc:postgresql://host:port/db
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — pas de données de seed en production
spring.flyway.locations=classpath:db/migration

# Reverse-proxy (nginx) qui termine le TLS : lire X-Forwarded-* pour que
# Spring sache que la requête d'origine est en HTTPS.
server.forward-headers-strategy=framework

# Cookie refresh_token envoyé uniquement sur connexion sécurisée (HTTPS).
app.cookie.secure=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App base URL
app.base-url=${APP_BASE_URL}

# Logging
logging.level.root=INFO
logging.level.com.nutrition.backend=INFO
