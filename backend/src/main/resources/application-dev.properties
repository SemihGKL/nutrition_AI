spring.application.name=backend

spring.config.import=optional:file:.env[.properties]

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/nutritionAI
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway manages the schema, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.locations=classpath:db/migration

# JWT — JWT_SECRET must be set as env var (min 32 chars)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.nutrition.backend=DEBUG
