name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: ./mvnw test

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Backend ────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        working-directory: backend
        run: |
          ./mvnw package -DskipTests
          mv target/backend-*.jar target/app.jar

      # ── Frontend ───────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Déploiement VPS ────────────────────────────────────────
      - name: Copy JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: backend/target/app.jar
          target: /opt/nutritionIA/
          strip_components: 2

      - name: Copy frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: frontend/dist/*
          target: /var/www/nutritionIA/
          strip_components: 2

      - name: Restart backend & verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl restart nutritionIA

            # Sonde de readiness RÉELLE : on attend un 200 sur /actuator/health
            # (direct sur 8080, sans passer par nginx). `systemctl is-active` ne
            # suffit pas : avec Type=simple il renvoie "active" dès que le process
            # java est forké, même si le contexte Spring plante juste après. C'est
            # ce faux positif qui a masqué un crash-loop de ~10 h (incident 07/2026,
            # cf. deploy/TROUBLESHOOTING.md).
            echo "Attente du démarrage du backend (readiness /actuator/health, max 90s)..."
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/actuator/health || true)
              if [ "$code" = "200" ]; then
                echo "✅ Backend UP (health 200 après ${i} tentative(s))"
                exit 0
              fi
              sleep 3
            done

            echo "❌ Backend PAS prêt après 90s — dernières lignes de log :"
            sudo journalctl -u nutritionIA --no-pager -n 60
            exit 1
