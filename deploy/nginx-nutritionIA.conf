# Config nginx d'exemple : sert le front statique ET proxifie l'API en MÊME ORIGINE.
# C'est ce qui rend le cookie refresh_token (SameSite=Strict) fonctionnel et permet
# au front d'appeler /api en relatif (VITE_API_URL non défini au build → BASE = '').
#
# À copier dans /etc/nginx/sites-available/nutritionIA puis activer + certbot.

server {
    listen 80;
    server_name votre-domaine.fr;
    # certbot ajoute normalement la redirection vers 443 ici.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name votre-domaine.fr;

    ssl_certificate     /etc/letsencrypt/live/votre-domaine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.fr/privkey.pem;

    root /var/www/nutritionIA;
    index index.html;

    # SPA React : toute route inconnue retombe sur index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → backend Spring Boot (127.0.0.1:8080).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Indispensable pour server.forward-headers-strategy=framework :
        # sans ça Spring croit être en HTTP et le cookie Secure poserait problème.
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
