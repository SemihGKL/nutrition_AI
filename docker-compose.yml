services:
  db:
    image: postgres:16-alpine
    container_name: nutritionIA-db
    environment:
      POSTGRES_DB: nutritionAI
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Bind sur la loopback uniquement : le backend tourne sur le même hôte (systemd).
    # Sans le préfixe 127.0.0.1, Docker publie le port en manipulant iptables
    # directement et CONTOURNE ufw → la base serait joignable depuis Internet.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
