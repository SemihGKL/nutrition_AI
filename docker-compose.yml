services:
  db:
    image: postgres:16-alpine
    container_name: nutritionIA-db
    environment:
      POSTGRES_DB: nutritionAI
      POSTGRES_USER: gkl
      POSTGRES_PASSWORD: REMOVED
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gkl -d nutritionAI"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
